<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Owed" />
  <meta name="theme-color" content="#0A0A0F" />
  <title>Owed</title>
  <link rel="manifest" href="/owed/manifest.json" />
  <link rel="apple-touch-icon" href="/owed/icons/icon-192.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0A0A0F; --surface: #141418; --card: #1C1C22; --border: #2A2A32;
      --accent: #A78BFA; --accent-d: #6D56C2; --green: #34D399; --red: #F87171;
      --amber: #FBBF24; --t1: #F0EFF5; --t2: #8A8A9A; --t3: #55555F;
      --radius: 16px; --safe-top: env(safe-area-inset-top,0px); --safe-bottom: env(safe-area-inset-bottom,0px);
    }
    html,body { height:100%; background:var(--bg); color:var(--t1); font-family:-apple-system,'SF Pro Text','Inter',sans-serif; overflow:hidden; }
    #app { display:flex; flex-direction:column; height:100%; padding-top:var(--safe-top); }
    .screen { display:none; flex-direction:column; flex:1; overflow:hidden; }
    .screen.active { display:flex; }
    .scroll-area { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px 16px calc(80px + var(--safe-bottom)); }
    .tab-bar { display:flex; background:var(--surface); border-top:1px solid var(--border); padding-bottom:var(--safe-bottom); flex-shrink:0; }
    .tab-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:10px 0 8px; cursor:pointer; }
    .tab-icon { font-size:22px; }
    .tab-label { font-size:10px; font-weight:500; color:var(--t3); }
    .tab-item.active .tab-label { color:var(--accent); }
    .eyebrow { font-size:11px; font-weight:600; color:var(--t2); letter-spacing:.08em; text-transform:uppercase; }
    .page-title { font-size:28px; font-weight:700; color:var(--t1); letter-spacing:-.5px; margin-top:2px; margin-bottom:16px; }
    .section-label { font-size:11px; font-weight:600; color:var(--t2); letter-spacing:.07em; text-transform:uppercase; margin-bottom:10px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:10px; }
    .summary-card { background:linear-gradient(135deg,#6D56C222,#A78BFA11); border:1px solid #A78BFA33; border-radius:var(--radius); padding:20px; margin-bottom:20px; }
    .summary-label { font-size:11px; font-weight:600; color:var(--accent); letter-spacing:.08em; text-transform:uppercase; }
    .summary-amount { font-size:40px; font-weight:700; letter-spacing:-1.5px; margin:4px 0 16px; }
    .summary-split { display:flex; gap:20px; flex-wrap:wrap; }
    .split-item { display:flex; flex-direction:column; gap:2px; }
    .split-lbl { font-size:11px; color:var(--t2); }
    .split-val { font-size:15px; font-weight:600; }
    .toggle-row { display:flex; background:var(--surface); border-radius:12px; padding:3px; margin-bottom:16px; }
    .toggle-btn { flex:1; padding:7px; border-radius:9px; border:none; cursor:pointer; font-size:13px; font-weight:600; background:transparent; color:var(--t2); }
    .toggle-btn.active { background:var(--card); color:var(--t1); box-shadow:0 1px 4px rgba(0,0,0,.4); }
    .debt-card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
    .debt-title { font-size:15px; font-weight:600; }
    .debt-date { font-size:11px; color:var(--t3); margin-top:2px; }
    .debt-amount { font-size:18px; font-weight:700; color:var(--red); text-align:right; }
    .debt-amount.settled { color:var(--green); }
    .debt-amount-sub { font-size:10px; color:var(--t3); text-align:right; }
    .progress-bg { background:var(--border); border-radius:4px; height:4px; margin-bottom:8px; }
    .progress-fill { height:4px; border-radius:4px; background:linear-gradient(90deg,var(--accent-d),var(--accent)); }
    .debt-footer { display:flex; justify-content:space-between; align-items:center; }
    .tag { font-size:10px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; padding:3px 8px; border-radius:6px; }
    .tag-open { background:#F8717122; color:var(--red); }
    .tag-partial { background:#A78BFA22; color:var(--accent); }
    .tag-done { background:#34D39922; color:var(--green); }
    .tag-recurring { background:#FBBF2422; color:var(--amber); margin-left:4px; }
    .year-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .year-month { font-size:12px; font-weight:500; color:var(--t2); width:28px; flex-shrink:0; }
    .year-track { flex:1; background:var(--surface); border-radius:6px; height:28px; overflow:hidden; }
    .year-fill { height:100%; border-radius:6px; display:flex; align-items:center; padding-left:8px; }
    .year-fill.open { background:linear-gradient(90deg,var(--accent-d),var(--accent)); }
    .year-fill.paid { background:linear-gradient(90deg,#22c97a,var(--green)); }
    .year-amount { font-size:12px; font-weight:600; color:var(--t2); width:64px; text-align:right; flex-shrink:0; }
    .form-field { margin-bottom:14px; }
    .form-label { font-size:11px; font-weight:600; color:var(--t2); letter-spacing:.07em; text-transform:uppercase; margin-bottom:6px; display:block; }
    .form-input { width:100%; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:13px 14px; color:var(--t1); font-size:16px; font-family:inherit; outline:none; -webkit-appearance:none; }
    .form-input:focus { border-color:#A78BFA88; }
    .form-hint { font-size:11px; color:var(--t3); margin-top:4px; }
    .form-row { display:flex; gap:10px; }
    .form-row .form-field { flex:1; }
    .pill-row { display:flex; gap:8px; flex-wrap:wrap; }
    .pill { padding:6px 14px; border-radius:20px; border:1px solid var(--border); font-size:13px; font-weight:500; cursor:pointer; background:transparent; color:var(--t2); font-family:inherit; }
    .pill.active { background:#A78BFA22; border-color:#A78BFA66; color:var(--accent); }
    .pill.active-green { background:#34D39922; border-color:#34D39966; color:var(--green); }
    .split-toggle { display:flex; gap:10px; margin-bottom:12px; }
    .split-btn { flex:1; border-radius:14px; border:1.5px solid var(--border); padding:14px 10px; cursor:pointer; background:var(--card); text-align:center; font-family:inherit; }
    .split-btn.active-full { border-color:var(--accent); background:#A78BFA11; }
    .split-btn.active-split { border-color:var(--green); background:#34D39911; }
    .ios-toggle { width:50px; height:30px; border-radius:15px; position:relative; cursor:pointer; flex-shrink:0; transition:background .2s; }
    .ios-toggle.on { background:var(--accent); }
    .ios-toggle.off { background:var(--border); }
    .ios-thumb { width:26px; height:26px; border-radius:13px; background:#fff; position:absolute; top:2px; transition:left .2s; box-shadow:0 1px 4px rgba(0,0,0,.3); }
    .ios-toggle.on .ios-thumb { left:22px; }
    .ios-toggle.off .ios-thumb { left:2px; }
    .btn-primary { width:100%; padding:15px; border-radius:14px; border:none; background:var(--accent); color:#fff; font-size:16px; font-weight:600; cursor:pointer; font-family:inherit; box-shadow:0 4px 16px #A78BFA44; }
    .btn-secondary { width:100%; padding:15px; border-radius:14px; border:1px solid var(--border); background:transparent; color:var(--t2); font-size:15px; font-weight:500; cursor:pointer; font-family:inherit; margin-top:8px; }
    .fab { position:fixed; bottom:calc(70px + var(--safe-bottom)); right:20px; width:52px; height:52px; border-radius:16px; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:26px; color:#fff; box-shadow:0 4px 20px #A78BFA55; cursor:pointer; border:none; z-index:100; }
    .info-note { background:#A78BFA11; border:1px solid #A78BFA22; border-radius:10px; padding:10px 12px; margin-bottom:14px; font-size:12px; color:var(--accent); }
    .info-note.green { background:#34D39911; border-color:#34D39922; color:var(--green); }
    .back-btn { display:flex; align-items:center; gap:4px; font-size:15px; color:var(--accent); cursor:pointer; margin-bottom:8px; background:none; border:none; font-family:inherit; padding:0; }
    .timeline-item { display:flex; gap:12px; margin-bottom:14px; }
    .timeline-dot { width:10px; height:10px; border-radius:50%; margin-top:4px; flex-shrink:0; }
    .timeline-content { flex:1; }
    .timeline-title { font-size:14px; font-weight:600; }
    .timeline-sub { font-size:12px; color:var(--t2); margin-top:2px; }
    .breakdown-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
    .breakdown-cell { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; }
    .breakdown-cell-label { font-size:10px; font-weight:600; color:var(--t2); letter-spacing:.07em; text-transform:uppercase; margin-bottom:4px; }
    .breakdown-cell-val { font-size:20px; font-weight:700; letter-spacing:-.5px; }
    .history-year { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:10px; overflow:hidden; }
    .history-year-header { padding:16px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
    .history-month-header { padding:11px 16px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; border-top:1px solid var(--border); }
    .history-debt-row { padding:9px 16px 9px 36px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid #2A2A3222; }
    .chevron { color:var(--t3); font-size:14px; margin-left:8px; }
    .alloc-preview { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:14px; }
    .alloc-header { padding:14px 16px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
    .alloc-row { padding:10px 16px; border-top:1px solid var(--border); }
    .alloc-row-header { display:flex; justify-content:space-between; margin-bottom:6px; }
    .alloc-pills { display:flex; gap:12px; }
    .alloc-pill { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--t2); }
    .alloc-dot { width:6px; height:6px; border-radius:3px; }
    #auth-screen { display:none; flex-direction:column; align-items:center; justify-content:center; flex:1; padding:32px; gap:24px; }
    .auth-logo { font-size:56px; font-weight:800; color:var(--accent); letter-spacing:-2px; }
    .auth-tagline { font-size:16px; color:var(--t2); text-align:center; }
    .auth-form { width:100%; max-width:340px; display:flex; flex-direction:column; gap:12px; }
    #loading { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:999; flex-direction:column; gap:12px; }
    .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #toast { position:fixed; bottom:calc(90px + var(--safe-bottom)); left:50%; transform:translateX(-50%) translateY(20px); background:var(--card); border:1px solid var(--border); border-radius:12px; padding:10px 18px; font-size:14px; color:var(--t1); opacity:0; transition:all .3s; z-index:200; white-space:nowrap; pointer-events:none; }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:300; display:flex; align-items:flex-end; }
    .modal { background:var(--surface); border-radius:24px 24px 0 0; padding:20px 20px calc(20px + var(--safe-bottom)); width:100%; max-height:90vh; overflow-y:auto; }
    .modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
    .modal-title { font-size:20px; font-weight:700; margin-bottom:20px; }
    .flex-between { display:flex; justify-content:space-between; align-items:center; }
    .mt8 { margin-top:8px; } .mt16 { margin-top:16px; }
    .text-accent { color:var(--accent); } .text-green { color:var(--green); } .text-red { color:var(--red); } .text-dim { color:var(--t3); }
    .fw700 { font-weight:700; } .fs13 { font-size:13px; } .fs11 { font-size:11px; }
  </style>
</head>
<body>

<div id="loading">
  <div style="font-size:32px;font-weight:800;color:#A78BFA;letter-spacing:-1px;">Owed</div>
  <div class="spinner"></div>
</div>

<div id="toast"></div>

<div id="app" style="display:none;">

  <!-- Auth -->
  <div id="auth-screen">
    <div class="auth-logo">Owed</div>
    <div class="auth-tagline">Track what's owed, effortlessly.</div>
    <div class="auth-form">
      <div id="step-email">
        <div class="form-field">
          <label class="form-label">Your email</label>
          <input id="auth-email" class="form-input" type="email" inputmode="email" autocomplete="email" placeholder="you@example.com" />
        </div>
        <button class="btn-primary" id="auth-btn" onclick="sendLink()">Send magic link</button>
        <div id="auth-msg" style="font-size:13px;color:var(--t2);text-align:center;margin-top:8px;display:none;"></div>
      </div>
    </div>
  </div>

  <!-- Main app -->
  <div id="main-app" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
    <div class="screen active" id="screen-dashboard">
      <div class="scroll-area" id="dashboard-scroll">
        <div class="eyebrow" id="dash-eyebrow">June 2025</div>
        <div class="page-title">Overview</div>
        <div class="toggle-row">
          <button class="toggle-btn active" id="toggle-month" onclick="setDashView('month')">Month</button>
          <button class="toggle-btn" id="toggle-year" onclick="setDashView('year')">Year</button>
        </div>
        <div id="dash-content"></div>
      </div>
      <button class="fab" onclick="openModal('add-debt')">+</button>
    </div>
    <div class="screen" id="screen-debts">
      <div class="scroll-area">
        <div class="eyebrow">All debts</div>
        <div class="page-title">Debts</div>
        <div id="debts-list"></div>
      </div>
      <button class="fab" onclick="openModal('add-debt')">+</button>
    </div>
    <div class="screen" id="screen-payments">
      <div class="scroll-area">
        <div class="eyebrow">Transfers</div>
        <div class="page-title">Payments</div>
        <div id="payments-list"></div>
      </div>
      <button class="fab" onclick="openModal('add-payment')">+</button>
    </div>
    <div class="screen" id="screen-history">
      <div class="scroll-area">
        <div class="eyebrow">All time</div>
        <div class="page-title">History</div>
        <div id="history-content"></div>
      </div>
    </div>
    <div class="screen" id="screen-settings">
      <div class="scroll-area">
        <div class="eyebrow">Preferences</div>
        <div class="page-title">Settings</div>
        <div id="settings-content"></div>
      </div>
    </div>
    <div class="tab-bar">
      <div class="tab-item active" onclick="switchTab('dashboard')"><span class="tab-icon">🏠</span><span class="tab-label">Overview</span></div>
      <div class="tab-item" onclick="switchTab('debts')"><span class="tab-icon">📋</span><span class="tab-label">Debts</span></div>
      <div class="tab-item" onclick="switchTab('payments')"><span class="tab-icon">💳</span><span class="tab-label">Payments</span></div>
      <div class="tab-item" onclick="switchTab('history')"><span class="tab-icon">📅</span><span class="tab-label">History</span></div>
      <div class="tab-item" onclick="switchTab('settings')"><span class="tab-icon">⚙️</span><span class="tab-label">Settings</span></div>
    </div>
  </div>
</div>

<div id="modal-container"></div>

<script>
// ── Config ────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://rjqzrhfyryzzuhabwpka.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqcXpyaGZ5cnl6enVoYWJ3cGthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMzAwMTAsImV4cCI6MjA5NzcwNjAxMH0.65C5hewK-dFnWcJLVj72RW4cVKaEmYzK5mNQMsaXdew';
const APP_URL       = 'https://quantoris.github.io/owed/';
const DEFAULT_RATE  = 0.06;

// ── Supabase ──────────────────────────────────────────────────
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true, flowType: 'implicit' }
});

// ── State ─────────────────────────────────────────────────────
let state = {
  user: null, profile: null, profiles: {},
  debts: [], payments: [], allocations: [],
  _ready: false,
  dashView: 'month',
  currentMonth: new Date().getMonth(),
  currentYear:  new Date().getFullYear(),
  expandedYears: new Set(), expandedMonths: new Set(),
};

// ── Handle auth callback (works for both PKCE and implicit) ──
(async () => {
  const hash = window.location.hash;
  const search = window.location.search;
  
  if (hash.includes('access_token=') || hash.includes('error=')) {
    // Implicit flow - token is in hash, Supabase JS handles it automatically
    return;
  }
  
  if (search.includes('code=')) {
    // PKCE flow - must exchange code for session explicitly
    try {
      const { data, error } = await sb.auth.exchangeCodeForSession(
        window.location.href
      );
      if (error) console.error('Code exchange error:', error);
    } catch(e) {
      console.error('Exchange error:', e);
    }
  }
})();

// ── Auth ──────────────────────────────────────────────────────
async function sendLink() {
  const email = document.getElementById('auth-email').value.trim().toLowerCase();
  if (!email) return showToast('Please enter your email');
  document.getElementById('auth-btn').textContent = 'Sending…';
  document.getElementById('auth-btn').disabled = true;
  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { shouldCreateUser: false, emailRedirectTo: APP_URL }
  });
  document.getElementById('auth-btn').textContent = 'Send magic link';
  document.getElementById('auth-btn').disabled = false;
  const msg = document.getElementById('auth-msg');
  msg.style.display = 'block';
  if (error) {
    msg.style.color = 'var(--red)';
    msg.textContent = error.message.includes('not found') || error.message.includes('Email not confirmed')
      ? 'This email is not authorised.'
      : 'Error: ' + error.message;
  } else {
    msg.style.color = 'var(--t2)';
    msg.textContent = '✉️ Check your email and tap the link to sign in.';
  }
}

// onAuthStateChange is the single entry point after magic link click
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session) {
    if (state._ready) return; // already handled
    state._ready = true;
    state.user = session.user;
    await bootApp();
  } else if (event === 'INITIAL_SESSION' && session) {
    if (state._ready) return;
    state._ready = true;
    state.user = session.user;
    await bootApp();
  } else if (event === 'INITIAL_SESSION' && !session) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    showAuth();
  } else if (event === 'SIGNED_OUT') {
    state = { ...state, user:null, profile:null, profiles:{}, debts:[], payments:[], allocations:[], _ready:false };
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    showAuth();
  }
});

async function bootApp() {
  try {
    // Load or create profile
    // Use RPC function to get or create profile (bypasses RLS issues)
    const name = localStorage.getItem('owed_display_name') || 
                 prompt('Welcome to Owed!\nWhat is your name?')?.trim() || 'User';
    localStorage.setItem('owed_display_name', name);
    
    const { data: profile, error: profileErr } = await sb.rpc('get_or_create_profile', {
      user_id: state.user.id,
      user_name: name,
    });
    
    if (profileErr) {
      console.error('Profile error:', profileErr);
      showToast('Profile error: ' + profileErr.message);
    }
    
    state.profile = profile;
    // Load all profiles for name labels
    const { data: all } = await sb.from('profiles').select('*');
    state.profiles = {};
    (all || []).forEach(p => {
      state.profiles[p.role] = p;
      state.profiles[p.id]   = p;
    });
    await loadData();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    // Clean hash from URL
    if (window.location.hash || window.location.search.includes('code=')) {
      window.history.replaceState(null, '', window.location.pathname);
    }
    showApp();
  } catch(e) {
    console.error('Boot error:', e);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    showAuth();
  }
}

// ── Data ──────────────────────────────────────────────────────
async function loadData() {
  const [d, p, a] = await Promise.all([
    sb.from('debts').select('*').order('date', { ascending: true }),
    sb.from('payments').select('*').order('date', { ascending: false }),
    sb.from('payment_allocations').select('*'),
  ]);
  state.debts       = d.data || [];
  state.payments    = p.data || [];
  state.allocations = a.data || [];
  renderAll();
}

// ── Interest calc ─────────────────────────────────────────────
function calcAccruedInterest(debt, asOf = new Date()) {
  if (!debt.applies_interest) return 0;
  const days = Math.max(0, Math.floor((asOf - new Date(debt.date)) / 86400000));
  const rem  = calcRemainingCapital(debt);
  return rem <= 0 ? 0 : Math.round(rem * Number(debt.interest_rate) / 365 * days * 100) / 100;
}
function calcRemainingCapital(debt) {
  const paid = state.allocations.filter(a => a.debt_id === debt.id).reduce((s,a) => s + Number(a.capital_paid), 0);
  return Math.max(0, Number(debt.amount) - paid);
}
function calcTotalInterestPaid(debt) {
  return state.allocations.filter(a => a.debt_id === debt.id).reduce((s,a) => s + Number(a.interest_paid), 0);
}
function isSettled(debt) { return calcRemainingCapital(debt) <= 0; }

// ── Allocation ────────────────────────────────────────────────
function simulateAllocation(amount, payer) {
  const open = state.debts
    .filter(d => d.debtor === payer && !isSettled(d) && !d.is_template)
    .sort((a,b) => new Date(a.date) - new Date(b.date));
  let rem = amount;
  const allocs = [];
  for (const debt of open) {
    if (rem <= 0) break;
    const interest = calcAccruedInterest(debt);
    const capital  = calcRemainingCapital(debt);
    const entry    = { debt, interestPaid: 0, capitalPaid: 0 };
    const iPay = Math.min(rem, interest);
    entry.interestPaid = Math.round(iPay * 100) / 100;
    rem = Math.round((rem - iPay) * 100) / 100;
    if (rem > 0) {
      const cPay = Math.min(rem, capital);
      entry.capitalPaid = Math.round(cPay * 100) / 100;
      rem = Math.round((rem - cPay) * 100) / 100;
    }
    if (entry.interestPaid > 0 || entry.capitalPaid > 0) allocs.push(entry);
  }
  return { allocations: allocs, surplus: Math.round(rem * 100) / 100 };
}

// ── Debt card ─────────────────────────────────────────────────
function debtCardHTML(debt) {
  const rem = calcRemainingCapital(debt);
  const int = calcAccruedInterest(debt);
  const settled = rem <= 0;
  const pct = Math.round((Number(debt.amount)-rem)/Number(debt.amount)*100);
  const status = settled?'done':rem<Number(debt.amount)?'partial':'open';
  return `<div class="card" onclick="openDebtDetail('${debt.id}')" style="cursor:pointer;">
    <div class="debt-card-header">
      <div><div class="debt-title">${esc(debt.description)}</div><div class="debt-date">${fmtDate(debt.date)} · ${debtorLabel(debt)}</div></div>
      <div><div class="debt-amount ${settled?'settled':''}">${settled?'Settled':fmt(rem+int)}</div>${!settled&&int>0?`<div class="debt-amount-sub">+${fmt(int)} interest</div>`:''}</div>
    </div>
    ${!settled?`<div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>`:''}
    <div class="debt-footer">
      <div><span class="tag tag-${status}">${status==='open'?'Open':status==='partial'?'Partial':'Settled'}</span>${debt.recurring?`<span class="tag tag-recurring">${debt.recurring}</span>`:''}</div>
      ${debt.applies_interest?`<span style="font-size:11px;color:var(--t3);">${(Number(debt.interest_rate)*100).toFixed(1)}% p.a.</span>`:''}
    </div>
  </div>`;
}

      const months = [...new Set(yD.map(d=>new Date(d.date).getMonth()))].sort((a,b)=>b-a);

        if (expM) {

  el.innerHTML = html;

      <div class="breakdown-cell"><div class="breakdown-cell-label">Remaining</div><div class="breakdown-cell-val text-red">${fmt(rem)}</div></div>
      <div class="breakdown-cell"><div class="breakdown-cell-label">Interest due</div><div class="breakdown-cell-val text-accent">${fmt(int)}</div></div>
      <div class="breakdown-cell"><div class="breakdown-cell-label">Original</div><div class="breakdown-cell-val">${fmt(Number(debt.amount))}</div></div>
      <div class="breakdown-cell"><div class="breakdown-cell-label">Paid back</div><div class="breakdown-cell-val text-green">${fmt(paidC)}</div></div>
    </div>
    <div class="progress-bg" style="height:6px;border-radius:6px;margin-bottom:6px;"><div class="progress-fill" style="width:${pct}%;height:6px;border-radius:6px;"></div></div>
    <div class="flex-between" style="margin-bottom:20px;"><span style="font-size:11px;color:var(--t3);">${pct}% paid</span><span style="font-size:11px;color:var(--t3);">${100-pct}% remaining</span></div>
    ${allocs.length?`<div class="section-label">Payment history</div>${allocs.map(a=>`<div class="timeline-item"><div class="timeline-dot" style="background:var(--green);"></div><div class="timeline-content"><div class="flex-between"><div><div class="timeline-title">${a.payment?.payer==='user1'?getUserLabel('user1'):getUserLabel('user2')} paid</div><div class="timeline-sub">${fmtDate(a.payment?.date)}</div><div style="font-size:11px;color:var(--t3);margin-top:2px;">${Number(a.interest_paid)>0?fmt(a.interest_paid)+' interest · ':''}${fmt(a.capital_paid)} capital</div></div><div style="font-size:15px;font-weight:700;color:var(--green);">-${fmt(Number(a.interest_paid)+Number(a.capital_paid))}</div></div></div></div>`).join('')}`:''}
    ${!settled?`<button class="btn-primary" style="margin-bottom:8px;" onclick="closeModal();openModal('add-payment')">Record payment</button>`:`<div class="info-note green">✓ Fully settled</div>`}
    <button class="btn-secondary" onclick="exportDebtPDF('${id}')">Export as PDF</button>
  </div></div>`);
}

// ── Add debt modal ────────────────────────────────────────────
function showAddDebt() {
  const isAdmin = state.profile?.role === 'admin';
  const defaultRate = document.getElementById('rate-input')?.value || 6;
  showModal(`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Add debt</div>
    <div class="info-note" id="debt-note">⚡ Interest applies · ${getUserLabel('user1')} is debtor · ${defaultRate}% p.a.</div>
    <div class="form-field"><label class="form-label">Description</label><input class="form-input" id="d-desc" placeholder="e.g. Rent July" /></div>
    <div class="form-row">
      <div class="form-field"><label class="form-label">Amount (€)</label><input class="form-input" id="d-amount" type="number" inputmode="decimal" placeholder="0.00" oninput="updateSplitPreview()" /></div>
      <div class="form-field"><label class="form-label">Date</label><input class="form-input" id="d-date" type="date" value="${today()}" /></div>
    </div>
    ${isAdmin?`<div class="form-field"><label class="form-label">Debtor</label><div class="pill-row">
      <button class="pill active" id="debtor-user1" onclick="setDebtor('user1')">${getUserLabel('user1')} owes ${getUserLabel('user2')}</button>
      <button class="pill" id="debtor-user2" onclick="setDebtor('user2')">${getUserLabel('user2')} owes ${getUserLabel('user1')}</button>
    </div></div>`:''}
    <div class="form-field"><label class="form-label">How to split?</label>
      <div class="split-toggle">
        <button class="split-btn active-full" id="btn-full" onclick="setSplit('full')"><div style="font-size:22px;margin-bottom:4px;">💳</div><div style="font-size:13px;font-weight:700;color:var(--accent);">Full</div><div style="font-size:10px;color:#A78BFA88;">100% owed</div></button>
        <button class="split-btn" id="btn-split" onclick="setSplit('split')"><div style="font-size:22px;margin-bottom:4px;">✂️</div><div style="font-size:13px;font-weight:700;color:var(--t2);">Split</div><div style="font-size:10px;color:var(--t3);">50% owed</div></button>
      </div>
      <div id="split-preview" style="display:none;" class="info-note green"></div>
    </div>
    <div class="form-field" id="rate-field"><label class="form-label">Interest rate (% p.a.)</label><input class="form-input" id="d-rate" type="number" step="0.1" value="${defaultRate}" /><div class="form-hint">Daily ACT/365 · only applies when ${getUserLabel('user1')} is debtor</div></div>
    <div class="form-field">
      <div class="flex-between" style="margin-bottom:8px;">
        <div><div class="form-label" style="margin-bottom:1px;">Recurring</div><div class="form-hint" style="margin-top:0;">Auto-adds on 1st of period</div></div>
        <div class="ios-toggle off" id="recurring-toggle" onclick="toggleRecurring()"><div class="ios-thumb"></div></div>
      </div>
      <div id="recurring-options" style="display:none;">
        <div class="pill-row">
          <button class="pill active" id="rec-monthly"   onclick="setRecurrence('monthly')">Monthly</button>
          <button class="pill"        id="rec-quarterly" onclick="setRecurrence('quarterly')">Quarterly</button>
          <button class="pill"        id="rec-yearly"    onclick="setRecurrence('yearly')">Yearly</button>
        </div>
        <div class="form-hint mt8" id="rec-hint">Next: automatic on 1st of each month</div>
      </div>
    </div>
    <div class="form-field"><label class="form-label">Notes (optional)</label><input class="form-input" id="d-notes" placeholder="Optional note" /></div>
    <button class="btn-primary" id="add-debt-btn" onclick="submitDebt()">Add debt</button>
  </div></div>`);
  window._debtForm = { debtor:'user1', split:'full', recurring:null };
}

function setDebtor(who) {
  window._debtForm.debtor = who;
  document.getElementById('debtor-user1')?.classList.toggle('active', who==='user1');
  document.getElementById('debtor-user2')?.classList.toggle('active', who==='user2');
  const applyInterest = who === 'user1';
  document.getElementById('rate-field').style.display = applyInterest ? 'block' : 'none';
  document.getElementById('debt-note').textContent = applyInterest
    ? `⚡ Interest applies · ${getUserLabel('user1')} is debtor · ${document.getElementById('d-rate')?.value||6}% p.a.`
    : `ℹ️ No interest · ${getUserLabel('user2')} is debtor`;
  updateSplitPreview();
}
function setSplit(type) {
  window._debtForm.split = type;
  document.getElementById('btn-full').className  = `split-btn ${type==='full'?'active-full':''}`;
  document.getElementById('btn-split').className = `split-btn ${type==='split'?'active-split':''}`;
  document.getElementById('btn-full').querySelector('div:nth-child(2)').style.color  = type==='full'?'var(--accent)':'var(--t2)';
  document.getElementById('btn-split').querySelector('div:nth-child(2)').style.color = type==='split'?'var(--green)':'var(--t2)';
  updateSplitPreview();
}
function updateSplitPreview() {
  const amt = parseFloat(document.getElementById('d-amount')?.value)||0;
  const p   = document.getElementById('split-preview'); if(!p) return;
  if (window._debtForm?.split==='split' && amt>0) { p.style.display='block'; p.innerHTML=`✂️ Total: ${fmt(amt)} · <strong style="color:var(--green);">${fmt(amt/2)} added as debt</strong> · ${fmt(amt/2)} not tracked`; }
  else p.style.display='none';
}
function toggleRecurring() {
  const t = document.getElementById('recurring-toggle');
  const on = t.classList.contains('on');
  t.classList.toggle('on',!on); t.classList.toggle('off',on);
  document.getElementById('recurring-options').style.display = on?'none':'block';
  window._debtForm.recurring = on ? null : 'monthly';
}
function setRecurrence(val) {
  window._debtForm.recurring = val;
  ['monthly','quarterly','yearly'].forEach(r => document.getElementById(`rec-${r}`)?.classList.toggle('active', r===val));
  const hints = {monthly:'Next: automatic on 1st of each month',quarterly:'Next: automatic on 1st of each quarter',yearly:'Next: automatic on 1st of each year'};
  document.getElementById('rec-hint').textContent = hints[val];
}
async function submitDebt() {
  const desc = document.getElementById('d-desc').value.trim();
  const amount = parseFloat(document.getElementById('d-amount').value);
  const date = document.getElementById('d-date').value;
  const rate = parseFloat(document.getElementById('d-rate')?.value||6)/100;
  const notes = document.getElementById('d-notes').value.trim();
  const {debtor, split, recurring} = window._debtForm;
  if (!desc||!amount||!date) return showToast('Please fill in all fields');
  if (amount<=0) return showToast('Amount must be greater than 0');
  if (rate<0||rate>1) return showToast('Interest rate must be between 0% and 100%');
  const creditor = debtor==='user1'?'user2':'user1';
  const appliesInterest = debtor==='user1';
  const debtAmount = split==='split' ? Math.round(amount/2*100)/100 : amount;
  document.getElementById('add-debt-btn').textContent = 'Adding…';
  const {data,error} = await sb.from('debts').insert({
    created_by: state.user?.id || state.profile?.id, debtor, creditor,
    description: desc, amount: debtAmount, original_amount: amount, split_type: split,
    interest_rate: appliesInterest?rate:0, applies_interest: appliesInterest,
    date, recurring: recurring||null, is_template: !!recurring, notes: notes||null,
  }).select().single();
  if (error) { showToast('Error: '+error.message); document.getElementById('add-debt-btn').textContent='Add debt'; return; }
  closeModal(); await loadData(); showToast('Debt added ✓');
}

// ── Add payment modal ─────────────────────────────────────────
function showAddPayment() {
  const isAdmin = state.profile?.role === 'admin';
  showModal(`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Record payment</div>
    ${isAdmin?`<div class="form-field"><label class="form-label">Who paid?</label><div class="pill-row">
      <button class="pill active" id="payer-user1" onclick="setPayer('user1')">${getUserLabel('user1')}</button>
      <button class="pill"        id="payer-user2" onclick="setPayer('user2')">${getUserLabel('user2')}</button>
    </div></div>`:''}
    <div class="form-row">
      <div class="form-field"><label class="form-label">Amount (€)</label><input class="form-input" id="p-amount" type="number" inputmode="decimal" placeholder="0.00" oninput="updateAllocPreview()" style="font-size:24px;font-weight:700;" /></div>
      <div class="form-field"><label class="form-label">Date</label><input class="form-input" id="p-date" type="date" value="${today()}" /></div>
    </div>
    <div id="alloc-preview"></div>
    <div class="form-field"><label class="form-label">Note (optional)</label><input class="form-input" id="p-notes" placeholder="e.g. June transfer" /></div>
    <button class="btn-primary" id="add-payment-btn" onclick="submitPayment()">Confirm payment</button>
  </div></div>`);
  window._paymentForm = { payer:'user1' };
}
function setPayer(who) {
  window._paymentForm.payer = who;
  ['user1','user2'].forEach(p=>document.getElementById(`payer-${p}`)?.classList.toggle('active',p===who));
  updateAllocPreview();
}
function updateAllocPreview() {
  const amt = parseFloat(document.getElementById('p-amount')?.value)||0;
  const preview = document.getElementById('alloc-preview'); if(!preview) return;
  if (amt<=0) { preview.innerHTML=''; return; }
  const payer = window._paymentForm?.payer||'user1';
  const {allocations,surplus} = simulateAllocation(amt,payer);
  const tI = allocations.reduce((s,a)=>s+a.interestPaid,0);
  const tC = allocations.reduce((s,a)=>s+a.capitalPaid,0);
  preview.innerHTML = `<div class="alloc-preview" style="margin-bottom:14px;">
    <div class="alloc-header"><div><div style="font-size:12px;font-weight:600;color:var(--t2);letter-spacing:.07em;text-transform:uppercase;">Allocation preview</div><div style="font-size:13px;color:var(--t1);margin-top:3px;"><span style="color:var(--accent);">${fmt(tI)} interest</span> · <span>${fmt(tC)} capital</span>${surplus>0?` · <span style="color:var(--green);">${fmt(surplus)} surplus</span>`:''}</div></div></div>
    ${allocations.map(a=>`<div class="alloc-row"><div class="alloc-row-header"><div><div style="font-size:13px;font-weight:600;">${esc(a.debt.description)}</div><div style="font-size:11px;color:var(--t3);">${fmtDate(a.debt.date)}</div></div><div style="font-size:14px;font-weight:700;color:var(--green);">-${fmt(a.interestPaid+a.capitalPaid)}</div></div><div class="alloc-pills">${a.interestPaid>0?`<div class="alloc-pill"><div class="alloc-dot" style="background:var(--accent)"></div>Interest ${fmt(a.interestPaid)}</div>`:''} ${a.capitalPaid>0?`<div class="alloc-pill"><div class="alloc-dot" style="background:var(--t2)"></div>Capital ${fmt(a.capitalPaid)}</div>`:''}</div></div>`).join('')}
    ${surplus>0?`<div style="padding:10px 16px;background:#34D39911;border-top:1px solid var(--border);font-size:12px;color:var(--green);font-weight:600;">✓ All debts cleared · ${fmt(surplus)} surplus</div>`:''}
  </div>`;
}
async function submitPayment() {
  const amount = parseFloat(document.getElementById('p-amount').value);
  const date   = document.getElementById('p-date').value;
  const notes  = document.getElementById('p-notes').value.trim();
  const payer  = window._paymentForm?.payer||'user1';
  if (!amount||!date) return showToast('Please fill in all fields');
  if (amount<=0) return showToast('Amount must be greater than 0');
  document.getElementById('add-payment-btn').textContent = 'Saving…';
  const {allocations} = simulateAllocation(amount,payer);
  const {data:pd,error:pErr} = await sb.from('payments').insert({ created_by:state.profile?.role||'user', payer, amount, date, notes:notes||null }).select().single();
  if (pErr) { showToast('Error: '+pErr.message); document.getElementById('add-payment-btn').textContent='Confirm payment'; return; }
  if (allocations.length) {
    await sb.from('payment_allocations').insert(allocations.map(a=>({ payment_id:pd.id, debt_id:a.debt.id, interest_paid:a.interestPaid, capital_paid:a.capitalPaid })));
  }
  closeModal(); await loadData(); showToast('Payment recorded ✓');
}

// ── Delete ────────────────────────────────────────────────────
async function deleteDebt(id) {
  if (!confirm('Delete this debt entry? Payment records will be kept.')) return;
  const {error:aErr} = await sb.from('payment_allocations').delete().eq('debt_id',id);
  if (aErr) { showToast('Error deleting records'); return; }
  const {error:dErr} = await sb.from('debts').delete().eq('id',id);
  if (dErr) { showToast('Error deleting debt'); return; }
  closeModal(); await loadData(); showToast('Deleted ✓');
}

// ── Export ────────────────────────────────────────────────────
function exportCSV() {
  const rows = [['ID','Description','Debtor','Creditor','Amount','Date','Interest Rate','Split','Recurring','Settled','Remaining','Accrued Interest']];
  state.debts.filter(d=>!d.is_template).forEach(d=>{
    rows.push([d.id,d.description,getUserLabel(d.debtor),getUserLabel(d.creditor),d.amount,d.date,(Number(d.interest_rate)*100).toFixed(2)+'%',d.split_type,d.recurring||'',isSettled(d)?'Yes':'No',calcRemainingCapital(d),calcAccruedInterest(d)]);
  });
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`owed-export-${today()}.csv`; a.click();
}
function exportDebtPDF(id) { showToast('PDF export coming soon'); }

// ── Push notifications ────────────────────────────────────────
async function requestNotifications() {
  if (!('Notification' in window)) return showToast('Not supported on this device');
  const perm = await Notification.requestPermission();
  showToast(perm==='granted'?'Notifications enabled ✓':'Notifications blocked');
}

// ── Recurring check ───────────────────────────────────────────
async function checkRecurring() {
  const templates = state.debts.filter(d=>d.is_template&&d.recurring);
  const todayStr  = today();
  const todayDate = new Date(todayStr);
  if (todayDate.getDate()!==1) return;
  const month = todayDate.getMonth();
  for (const t of templates) {
    let fire = false;
    if (t.recurring==='monthly') fire=true;
    else if (t.recurring==='quarterly') fire=(month%3===0);
    else if (t.recurring==='yearly')    fire=(month===new Date(t.date).getMonth());
    if (!fire) continue;
    const exists = state.debts.find(d=>d.recurring_parent_id===t.id&&d.date===todayStr);
    if (exists||!t.amount||Number(t.amount)<=0) continue;
    await sb.from('debts').insert({ created_by:t.created_by, debtor:t.debtor, creditor:t.creditor, description:t.description, amount:t.amount, original_amount:t.original_amount, split_type:t.split_type, interest_rate:t.interest_rate, applies_interest:t.applies_interest, date:todayStr, recurring:t.recurring, recurring_parent_id:t.id, is_template:false, notes:t.notes });
  }
}

// ── UI helpers ────────────────────────────────────────────────
function openModal(type) { if(type==='add-debt') showAddDebt(); else if(type==='add-payment') showAddPayment(); }
function showModal(html) { document.getElementById('modal-container').innerHTML=html; document.body.style.overflow='hidden'; }
function closeModal()    { document.getElementById('modal-container').innerHTML=''; document.body.style.overflow=''; }
function showAuth()  { document.getElementById('auth-screen').style.display='flex'; document.getElementById('main-app').style.display='none'; }
function showApp()   { document.getElementById('auth-screen').style.display='none'; document.getElementById('main-app').style.display='flex'; renderAll(); }
function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  document.getElementById(`screen-${tab}`).classList.add('active');
  ['dashboard','debts','payments','history','settings'].forEach((t,i)=>{ if(t===tab) document.querySelectorAll('.tab-item')[i]?.classList.add('active'); });
  if (tab==='history')  renderHistory();
  if (tab==='settings') renderSettings();
}
function renderAll() { renderDashboard(); renderDebts(); renderPayments(); }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function confirmSignOut() { if(confirm('Sign out?')) sb.auth.signOut(); }
function fmt(n) { return '€'+Number(n||0).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d) { if(!d) return '—'; return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function today() { return new Date().toISOString().split('T')[0]; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Register service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('/owed/sw.js').catch(console.error); });
}

// Start
checkRecurring();
</script>
